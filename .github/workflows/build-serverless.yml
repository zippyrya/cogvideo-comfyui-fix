name: Build & Push CogVideo Serverless

on:
  workflow_dispatch:
  push:
    paths:
      - 'Dockerfile.serverless'
      - 'handler.py'
      - 'requirements.txt'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push serverless image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.serverless
          push: true
          tags: |
            clawsyil/cogvideo-serverless:latest
            clawsyil/cogvideo-serverless:v1
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Verify image
        run: |
          docker pull clawsyil/cogvideo-serverless:latest
          docker run --rm --gpus all clawsyil/cogvideo-serverless:latest python -c "import torch; print('PyTorch:', torch.__version__); print('CUDA available:', torch.cuda.is_available()); print('GPU:', torch.cuda.get_device_name(0) if torch.cuda.is_available() else 'None')"
